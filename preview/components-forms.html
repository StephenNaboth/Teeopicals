<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:var(--cream-50)}.input{width:100%;padding:14px 16px;border:1.5px solid var(--line-200);border-radius:14px;font-family:var(--font-sans);font-size:16px;background:white;outline:none;transition:border-color 120ms}.input:focus{border-color:var(--iris-600)}.label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-500);margin-bottom:6px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;background:var(--iris-100);color:var(--iris-900);font-size:14px;font-weight:500;border:none;cursor:pointer}.chip.on{background:var(--iris-600);color:white}</style></head><body>
<div class="row">
<div><label class="label">Your name</label><input class="input" placeholder="Anna M."/></div>
<div><label class="label">Phone</label><input class="input" value="+255 740 952 555"/></div>
</div>
<div style="margin-top:14px"><label class="label">Reason for visit</label>
<div style="display:flex;gap:8px;flex-wrap:wrap"><button class="chip on">Eye exam</button><button class="chip">Contact lenses</button><button class="chip">Glasses</button><button class="chip">Dry eyes</button></div>
</div>
</body></html>
