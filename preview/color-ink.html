<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--cream-50);font-family:var(--font-sans)}.wrap{display:flex;gap:14px;flex-wrap:wrap}.sw{width:130px;height:110px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;border:1px solid var(--line-200)}.sw .n{font-size:12px;font-weight:600;color:var(--ink-900);background:rgba(255,255,255,0.85);padding:2px 6px;border-radius:4px;display:inline-block;width:fit-content;margin-bottom:2px}.sw .v{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);background:rgba(255,255,255,0.85);padding:1px 5px;border-radius:3px;display:inline-block;width:fit-content}</style></head><body><div class="wrap">
<div class="sw" style="background:#141414"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">ink-900</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#141414</span></div>
<div class="sw" style="background:#2F2F2D"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">ink-700</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#2F2F2D</span></div>
<div class="sw" style="background:#5B5B58"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">ink-500</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#5B5B58</span></div>
<div class="sw" style="background:#8A8A85"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">ink-400</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#8A8A85</span></div>
<div class="sw" style="background:#E6E0D4"><span class="n">line-200</span><span class="v">#E6E0D4</span></div>
<div class="sw" style="background:#F0EBDF"><span class="n">line-100</span><span class="v">#F0EBDF</span></div>
</div></body></html>
