<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--cream-50);font-family:var(--font-sans)}.wrap{display:flex;gap:14px;flex-wrap:wrap}.sw{width:130px;height:110px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;border:1px solid var(--line-200)}.sw .n{font-size:12px;font-weight:600;color:var(--ink-900);background:rgba(255,255,255,0.85);padding:2px 6px;border-radius:4px;display:inline-block;width:fit-content;margin-bottom:2px}.sw .v{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);background:rgba(255,255,255,0.85);padding:1px 5px;border-radius:3px;display:inline-block;width:fit-content}</style></head><body><div class="wrap">
<div class="sw" style="background:#BF4A35"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">coral-700</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#BF4A35</span></div>
<div class="sw" style="background:#F26E56"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">coral-500</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#F26E56</span></div>
<div class="sw" style="background:#F9B4A5"><span class="n">coral-300</span><span class="v">#F9B4A5</span></div>
<div class="sw" style="background:#FCE1D9"><span class="n">coral-100</span><span class="v">#FCE1D9</span></div>
<div class="sw" style="background:#FAF6EF"><span class="n">cream-50</span><span class="v">#FAF6EF</span></div>
<div class="sw" style="background:#F3ECDC"><span class="n">cream-100</span><span class="v">#F3ECDC</span></div>
<div class="sw" style="background:#FFFFFF"><span class="n">paper</span><span class="v">#FFFFFF</span></div>
</div></body></html>
