<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:20px;background:var(--cream-50);font-family:var(--font-sans)}.wrap{display:flex;gap:14px;flex-wrap:wrap}.sw{width:130px;height:110px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}.sw .n{font-size:12px;font-weight:600;color:var(--ink-900);background:rgba(255,255,255,0.85);padding:2px 6px;border-radius:4px;display:inline-block;width:fit-content;margin-bottom:2px}.sw .v{font-family:var(--font-mono);font-size:11px;color:var(--ink-500);background:rgba(255,255,255,0.85);padding:1px 5px;border-radius:3px;display:inline-block;width:fit-content}</style></head><body><div class="wrap">
<div class="sw" style="background:#0A3D30"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">iris-900</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#0A3D30</span></div>
<div class="sw" style="background:#0B5643"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">iris-700</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#0B5643</span></div>
<div class="sw" style="background:#0E6B53"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">iris-600 ★</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#0E6B53</span></div>
<div class="sw" style="background:#14846A"><span class="n" style="color:white;background:rgba(0,0,0,0.3)">iris-500</span><span class="v" style="color:white;background:rgba(0,0,0,0.3)">#14846A</span></div>
<div class="sw" style="background:#9BCEC0"><span class="n">iris-300</span><span class="v">#9BCEC0</span></div>
<div class="sw" style="background:#DCEFE7"><span class="n">iris-100</span><span class="v">#DCEFE7</span></div>
<div class="sw" style="background:#EEF7F3"><span class="n">iris-50</span><span class="v">#EEF7F3</span></div>
</div></body></html>
