<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:24px;background:var(--cream-50);font-family:var(--font-sans)}.row{display:flex;gap:12px;flex-wrap:wrap}.sw{flex:1;min-width:150px;height:84px;border-radius:14px;padding:12px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--shadow-sm)}.sw .n{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}.sw .v{font-family:var(--font-mono);font-size:13px;font-weight:500}</style></head><body><div class="row">
<div class="sw" style="background:#0E6B53;color:white"><span class="n">Success</span><span class="v">#0E6B53</span></div>
<div class="sw" style="background:#D6A437;color:#141414"><span class="n">Warning</span><span class="v">#D6A437</span></div>
<div class="sw" style="background:#C54A3A;color:white"><span class="n">Danger</span><span class="v">#C54A3A</span></div>
<div class="sw" style="background:#3B6BA5;color:white"><span class="n">Info</span><span class="v">#3B6BA5</span></div>
</div></body></html>
